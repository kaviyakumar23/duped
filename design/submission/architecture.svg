<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="700" viewBox="0 0 1240 700" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c12"/><stop offset="1" stop-color="#06070b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9b0"/><stop offset="1" stop-color="#f5c969"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0b2"/>
    </marker>
    <marker id="arrT" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2ee6cf"/>
    </marker>
  </defs>

  <rect width="1240" height="700" fill="url(#bg)"/>

  <!-- title -->
  <rect x="40" y="34" width="11" height="26" rx="2" fill="url(#gold)"/>
  <text x="62" y="55" fill="#e8eaf0" font-size="26" font-weight="800" letter-spacing="-0.5">DUPED</text>
  <text x="170" y="55" fill="#6b7186" font-size="13" letter-spacing="3">A GLOBALLY CONSISTENT ECONOMY KERNEL FOR ONLINE GAMES</text>
  <line x1="40" y1="78" x2="1200" y2="78" stroke="rgba(255,255,255,.1)"/>

  <!-- clients -->
  <rect x="40" y="120" width="220" height="120" rx="12" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.12)"/>
  <text x="150" y="150" fill="#9aa0b2" font-size="12" letter-spacing="2" text-anchor="middle">CLIENTS</text>
  <text x="150" y="178" fill="#e8eaf0" font-size="13" text-anchor="middle">game servers · bots</text>
  <text x="150" y="200" fill="#e8eaf0" font-size="13" text-anchor="middle">POST /api/v1/trades</text>
  <text x="150" y="224" fill="#6b7186" font-size="11" text-anchor="middle">TradeRequest (items + gold)</text>

  <!-- kernel -->
  <rect x="330" y="96" width="300" height="172" rx="14" fill="rgba(46,230,207,.06)" stroke="rgba(46,230,207,.4)" stroke-width="1.5"/>
  <text x="480" y="124" fill="#2ee6cf" font-size="13" letter-spacing="2" text-anchor="middle">THE TRADE KERNEL · executeTrade()</text>
  <text x="480" y="150" fill="#e8eaf0" font-size="12.5" text-anchor="middle">one idempotent, atomic, OCC-retrying txn</text>
  <text x="480" y="176" fill="#c5cad6" font-size="11.5" text-anchor="middle">• version-guarded item transfer (1 row, 1 owner)</text>
  <text x="480" y="196" fill="#c5cad6" font-size="11.5" text-anchor="middle">• sharded conserved gold + balanced ledger</text>
  <text x="480" y="216" fill="#c5cad6" font-size="11.5" text-anchor="middle">• idempotency registry (exactly-once)</text>
  <text x="480" y="244" fill="#6b7186" font-size="10.5" text-anchor="middle">"owned twice" has no representation</text>

  <!-- arrow clients -> kernel -->
  <line x1="262" y1="180" x2="326" y2="180" stroke="#9aa0b2" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- DSQL truth core -->
  <rect x="700" y="96" width="320" height="172" rx="14" fill="rgba(160,123,255,.06)" stroke="rgba(160,123,255,.45)" stroke-width="1.5"/>
  <text x="860" y="124" fill="#a07bff" font-size="13" letter-spacing="2" text-anchor="middle">AURORA DSQL · TRUTH CORE</text>
  <text x="860" y="148" fill="#e8eaf0" font-size="12" text-anchor="middle">active-active · strongly consistent</text>
  <!-- two regions -->
  <rect x="724" y="166" width="130" height="78" rx="9" fill="rgba(46,230,207,.07)" stroke="rgba(46,230,207,.35)"/>
  <text x="789" y="190" fill="#2ee6cf" font-size="12" text-anchor="middle">TOKYO</text>
  <text x="789" y="208" fill="#9aa0b2" font-size="10" text-anchor="middle">ap-northeast-1</text>
  <text x="789" y="228" fill="#6b7186" font-size="9.5" text-anchor="middle">primary</text>
  <rect x="866" y="166" width="130" height="78" rx="9" fill="rgba(160,123,255,.07)" stroke="rgba(160,123,255,.35)"/>
  <text x="931" y="190" fill="#a07bff" font-size="12" text-anchor="middle">SEOUL</text>
  <text x="931" y="208" fill="#9aa0b2" font-size="10" text-anchor="middle">ap-northeast-2</text>
  <text x="931" y="228" fill="#6b7186" font-size="9.5" text-anchor="middle">secondary</text>
  <text x="860" y="258" fill="#6b7186" font-size="9.5" text-anchor="middle">ONE logical database — cross-region trades serialize · exactly one wins</text>

  <!-- arrow kernel <-> DSQL -->
  <line x1="632" y1="182" x2="696" y2="182" stroke="#9aa0b2" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="664" y="174" fill="#6b7186" font-size="9" text-anchor="middle">writes</text>

  <!-- tables strip -->
  <rect x="330" y="300" width="690" height="58" rx="10" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.1)"/>
  <text x="675" y="322" fill="#9aa0b2" font-size="10.5" letter-spacing="1.5" text-anchor="middle">ALL WRITTEN IN ONE TRANSACTION</text>
  <text x="675" y="344" fill="#c5cad6" font-size="11.5" text-anchor="middle">item_instances · currency_shards · trades · item_moves · economy_ledger_* · trade_idempotency · world_outbox</text>
  <line x1="480" y1="268" x2="480" y2="298" stroke="#9aa0b2" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="860" y1="268" x2="860" y2="298" stroke="#9aa0b2" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- outbox -> DynamoDB -->
  <rect x="700" y="404" width="320" height="96" rx="14" fill="rgba(46,230,207,.05)" stroke="rgba(46,230,207,.35)"/>
  <text x="860" y="432" fill="#2ee6cf" font-size="13" letter-spacing="2" text-anchor="middle">AMAZON DYNAMODB · READ MODEL</text>
  <text x="860" y="456" fill="#e8eaf0" font-size="12" text-anchor="middle">live world: settlement feed + projections</text>
  <text x="860" y="478" fill="#6b7186" font-size="10.5" text-anchor="middle">written only by the transactional-outbox projector (project-on-read)</text>
  <path d="M675,358 L675,452 L696,452" fill="none" stroke="#2ee6cf" stroke-width="1.6" marker-end="url(#arrT)"/>
  <text x="640" y="430" fill="#2ee6cf" font-size="9" text-anchor="middle">outbox</text>

  <!-- Vercel world -->
  <rect x="330" y="404" width="300" height="96" rx="14" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.12)"/>
  <text x="480" y="432" fill="#9aa0b2" font-size="12" letter-spacing="2" text-anchor="middle">VERCEL · THE LIVE WORLD</text>
  <text x="480" y="456" fill="#e8eaf0" font-size="12" text-anchor="middle">arena · economy console · guided demo</text>
  <text x="480" y="478" fill="#6b7186" font-size="10.5" text-anchor="middle">OIDC federation to AWS — no credentials in code</text>
  <line x1="696" y1="452" x2="634" y2="452" stroke="#9aa0b2" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- invariant board -->
  <path d="M860,358 L860,388 L1060,388 L1060,150 L1024,150" fill="none" stroke="rgba(67,224,143,.5)" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="1060" y="120" width="140" height="120" rx="12" fill="rgba(67,224,143,.05)" stroke="rgba(67,224,143,.35)"/>
  <text x="1130" y="146" fill="#43e08f" font-size="11" letter-spacing="1.5" text-anchor="middle">THE PROOF</text>
  <text x="1130" y="170" fill="#e8eaf0" font-size="10.5" text-anchor="middle">live SQL</text>
  <text x="1130" y="190" fill="#c5cad6" font-size="10" text-anchor="middle">legendary = 1</text>
  <text x="1130" y="208" fill="#c5cad6" font-size="10" text-anchor="middle">gold drift = 0</text>
  <text x="1130" y="226" fill="#c5cad6" font-size="10" text-anchor="middle">ledger = 0</text>

  <!-- footer proof line -->
  <line x1="40" y1="556" x2="1200" y2="556" stroke="rgba(255,255,255,.1)"/>
  <text x="40" y="588" fill="#9aa0b2" font-size="12" letter-spacing="1">MEASURED:</text>
  <text x="135" y="588" fill="#e8eaf0" font-size="12">10k+ concurrent dupe attempts → legendary count stays 1 · 482/482 cross-region grabs blocked · gold conserved · 42→383 trades/sec</text>
  <text x="40" y="616" fill="#6b7186" font-size="11">No foreign keys (DSQL) · async indexes · BIGINT minor units · OCC (SQLSTATE 40001) retries surfaced · IAM/OIDC auth (no passwords)</text>
  <text x="40" y="654" fill="#ffd87a" font-size="12.5">Duplication isn't patched here — the authoritative state has no way to represent it.</text>
</svg>
